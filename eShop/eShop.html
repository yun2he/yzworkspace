<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Shop</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="josefin-sans-title">The Secret Shop</h1>
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <button type="submit"><i class="fas fa-search"></i></button>
            </div>
            <nav>
                <ul>
                    <li><a href="#home" title="Home"><i class="fas fa-home"></i></a></li>
                    <li><a href="#products" title="Products"><i class="fas fa-shopping-bag"></i></a></li>
                    <li><a href="#cart" title="Cart"><i class="fas fa-shopping-cart"></i></a></li>
                    <li><a href="#login" title="Log In/Register"><i class="fas fa-user"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="banner">
        <!-- Banner image will be added here -->
    </div>

    <main>
        <section id="products">
            <div class="product-list">
                <!-- Product items will be added here by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 The Secret Shop. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
